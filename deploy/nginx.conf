# /etc/nginx/sites-available/causal-engine
# Symlink: ln -s /etc/nginx/sites-available/causal-engine /etc/nginx/sites-enabled/
#
# Before using this file:
#   1. Replace YOUR_DOMAIN with your actual domain (e.g. api.yourdomain.com)
#      OR if using a raw IP, see the "IP-only" section at the bottom.
#   2. Run: sudo certbot --nginx -d YOUR_DOMAIN
#      Certbot will auto-update the ssl_certificate lines below.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let certbot handle ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # Certbot will fill these in after: sudo certbot --nginx -d YOUR_DOMAIN
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Proxy to FastAPI (gunicorn on 127.0.0.1:8000)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Counterfactual runs can be slow — give them time
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Optional: serve large static files directly (e.g. exported charts)
    location /static/ {
        alias /srv/causal-engine/static/;
        expires 1d;
    }
}

# ─── IP-only fallback (no domain / no HTTPS) ──────────────────────────────────
# If you don't have a domain yet, comment out everything above and use this:
