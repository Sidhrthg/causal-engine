app = "causal-engine"
primary_region = "sjc"  # San Jose — closest to Stanford

[build]

[env]
  LOG_LEVEL = "INFO"
  API_HOST = "0.0.0.0"
  API_PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-2x"
  memory = "4gb"

[mounts]
  source = "causal_data"
  destination = "/app/data"
  initial_size = "10gb"

[[statics]]
  guest_path = "/app/static"
  url_prefix = "/static"
