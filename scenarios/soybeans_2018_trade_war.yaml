# US-China soybean trade war backtest — 2018
#
# In July 2018 China imposed 25% retaliatory tariffs on US soybeans.
# US exports fell from 55.4 Mt (2017) to 46.4 Mt (2018), a -16% drop.
# Brazil absorbed ~10 Mt of redirected Chinese demand.
#
# Shock: export_restriction magnitude=0.16 on dominant exporter (USA) in 2018.
# Recovery: Phase 1 trade deal (Jan 2020) → Chinese purchases surged to 64.6 Mt.
#
# Used in predictability backtest: _soybeans_2018_trade_war()
name: soybeans_2018_trade_war
commodity: soybeans
seed: 123

time:
  dt: 1.0
  start_year: 2016
  end_year: 2021

baseline:
  P_ref: 1.0
  P0: 1.0
  K0: 108.695652
  I0: 20.0
  D0: 100.0

parameters:
  eps: 1e-9

  u0: 0.92
  beta_u: 0.10
  u_min: 0.70
  u_max: 1.00

  tau_K: 1.97
  eta_K: 0.40
  retire_rate: 0.03

  eta_D: -0.43
  demand_growth:
    type: constant
    g: 1.02

  alpha_P: 0.30
  cover_star: 0.20
  lambda_cover: 0.60
  sigma_P: 0.00

shocks:
  # 2018: China 25% tariff → US exports to China collapsed (-16% total US exports)
  - type: export_restriction
    start_year: 2018
    end_year: 2018
    magnitude: 0.16

  # 2020: Phase 1 deal → Chinese demand surge, US exports hit record 64.6 Mt (+39% vs 2018)
  - type: demand_surge
    start_year: 2020
    end_year: 2020
    magnitude: 0.15

policy:
  substitution: 0.0
  efficiency: 0.0
  subsidy: 0.0
  stockpile_release: 0.0

outputs:
  out_dir: runs
  save_csv: true
  metrics:
    - total_shortage
    - peak_shortage
    - avg_price
    - final_inventory_cover
