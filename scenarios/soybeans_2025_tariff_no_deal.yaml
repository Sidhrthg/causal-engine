# US-China Soybean Tariff Escalation — NO DEAL / Escalation Path
#
# Same starting conditions as soybeans_2025_tariff_escalation.yaml but:
#   - No partial deal in 2027
#   - Tariffs persist or worsen through 2028
#   - US farmers accelerate pivot to other crops (corn, wheat) as China market lost
#     → additional capex_shock from structural acreage shift
#
# This represents the tail risk scenario: US-China trade decoupling in agriculture.
# Historical analogue: post-2018 US share of China soy imports never fully recovered
# even after Phase 1 — Brazil locked in structural market share gains.
#
# For Pearl L3 counterfactual comparison against BASE path:
#   P(shortage_2028 | no_deal) vs P(shortage_2028 | partial_deal)

name: soybeans_2025_tariff_no_deal
commodity: soybeans
seed: 123

time:
  dt: 1.0
  start_year: 2023
  end_year: 2028

baseline:
  P_ref: 1.0
  P0: 1.0
  K0: 108.695652
  I0: 20.0
  D0: 100.0

parameters:
  eps: 1e-9

  u0: 0.92
  beta_u: 0.10
  u_min: 0.70
  u_max: 1.00

  tau_K: 1.97
  eta_K: 0.40
  retire_rate: 0.03

  eta_D: -0.43
  demand_growth:
    type: constant
    g: 1.02

  alpha_P: 0.30
  cover_star: 0.20
  lambda_cover: 0.60
  sigma_P: 0.00

shocks:
  # Shock timing: P at year Y is pre-shock. Shock at Y shows in Y+1 price.

  # 2023-2024: same as BASE — Brazil glut, falling prices
  - type: demand_surge
    start_year: 2023
    end_year: 2023
    magnitude: -0.18

  - type: demand_surge
    start_year: 2024
    end_year: 2024
    magnitude: -0.10

  # 2025: same as BASE — 125% tariff, US exports -33%
  - type: export_restriction
    start_year: 2025
    end_year: 2025
    magnitude: 0.33

  # 2026: Tariffs deepen to full restriction — US exports -42%
  - type: export_restriction
    start_year: 2026
    end_year: 2026
    magnitude: 0.42

  # 2027: No deal — tariffs persist. US farmers structurally shift to corn/wheat.
  # Additional capex_shock: lost China market reduces planting investment in soy.
  - type: export_restriction
    start_year: 2027
    end_year: 2027
    magnitude: 0.42

  - type: capex_shock
    start_year: 2027
    end_year: 2027
    magnitude: 0.12

  # 2028: Structural decoupling locks in — US soy acreage permanently reduced
  - type: export_restriction
    start_year: 2028
    end_year: 2028
    magnitude: 0.38

  - type: capex_shock
    start_year: 2028
    end_year: 2028
    magnitude: 0.10

policy:
  substitution: 0.0
  efficiency: 0.0
  subsidy: 0.0
  stockpile_release: 0.0

outputs:
  out_dir: runs
  save_csv: true
  metrics:
    - total_shortage
    - peak_shortage
    - avg_price
    - final_inventory_cover
